name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Run Ruff
        run: uv run ruff check .

  test:
    name: Compile and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Compile project sources
        run: python -m compileall src scripts tests

      - name: Run pytest
        run: uv run pytest

  smoke:
    name: Compose smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    env:
      COMPOSE_PROJECT_NAME: pggraphrag_mcp
      PGGRAPHRAG_MCP_PROXY_PORT: "9443"
      PGGRAPHRAG_MCP_SMALL_AUTH_TOKEN: change-me-local-token
      PGGRAPHRAG_MCP_DB_PASSWORD: change-me-db-password
      PGGRAPHRAG_MCP_DATABASE_URL: postgresql://pggraphrag_app:change-me-db-password@pggraphrag-db:5432/pggraphrag
      OPENAI_API_KEY: ""

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Create environment file
        run: |
          cp .env.example .env
          {
            echo "COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}"
            echo "PGGRAPHRAG_MCP_PROXY_PORT=${PGGRAPHRAG_MCP_PROXY_PORT}"
            echo "PGGRAPHRAG_MCP_SMALL_AUTH_TOKEN=${PGGRAPHRAG_MCP_SMALL_AUTH_TOKEN}"
            echo "PGGRAPHRAG_MCP_DB_PASSWORD=${PGGRAPHRAG_MCP_DB_PASSWORD}"
            echo "PGGRAPHRAG_MCP_DATABASE_URL=${PGGRAPHRAG_MCP_DATABASE_URL}"
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
          } >> .env

      - name: Create local TLS certificate
        run: |
          mkdir -p docker/traefik/certs
          openssl req -x509 -nodes -days 365 \
            -newkey rsa:2048 \
            -keyout docker/traefik/certs/dev.key \
            -out docker/traefik/certs/dev.crt \
            -subj "/CN=localhost"

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Start compose stack
        run: |
          docker compose --env-file .env -f docker/docker-compose.yml -f docker/docker-compose.small-auth.yml up -d --build

      - name: Wait for services
        run: sleep 10

      - name: Run smoke test
        run: |
          uv run python scripts/mcp_http_smoke.py \
            --base-url "https://localhost:${PGGRAPHRAG_MCP_PROXY_PORT}" \
            --mcp-path /mcp \
            --bearer-token "${PGGRAPHRAG_MCP_SMALL_AUTH_TOKEN}" \
            --insecure

      - name: Collect compose logs on failure
        if: failure()
        run: |
          docker compose --env-file .env -f docker/docker-compose.yml -f docker/docker-compose.small-auth.yml ps
          docker compose --env-file .env -f docker/docker-compose.yml -f docker/docker-compose.small-auth.yml logs --no-color

      - name: Tear down compose stack
        if: always()
        run: |
          docker compose --env-file .env -f docker/docker-compose.yml -f docker/docker-compose.small-auth.yml down --remove-orphans --volumes
